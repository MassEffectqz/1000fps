# ============================================================
# Docker Compose с Redis для кэширования
# Используйте: docker compose -f docker-compose.redis.yml up -d
# ============================================================

services:
  # Redis для кэширования
  redis:
    image: redis:7-alpine
    container_name: 1000fps-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - 1000fps-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local

networks:
  1000fps-network:
    driver: bridge
