# ============================================================
# Docker Compose для продакшена 1000fps
# Сервисы: PostgreSQL + Next.js App + Parser Server + Nginx
# ============================================================

services:
  # ------------------------------------------------------------
  # PostgreSQL - База данных
  # ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: 1000fps-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fps1000}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fps1000}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - 1000fps-network
    # Раскомментировать для доступа к БД снаружи
    # ports:
    #   - "5432:5432"

  # ------------------------------------------------------------
  # Next.js App - Основное приложение
  # ------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 1000fps-app
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fps1000}?schema=public
      - PARSER_URL=http://parser:3005
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost}
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - PORT=3000
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - 1000fps-network
    # App не пробрасываем наружу - доступ через nginx

  # ------------------------------------------------------------
  # Parser Server - Сервер парсинга
  # ------------------------------------------------------------
  parser:
    build:
      context: ./parser
      dockerfile: Dockerfile
    container_name: 1000fps-parser
    restart: always
    environment:
      - NODE_ENV=production
      - PARSER_PORT=3005
      - DB_PATH=/app/data/parser.db
    volumes:
      - parser_data:/app/data
    depends_on:
      - app
    networks:
      - 1000fps-network
    # Parser не пробрасываем наружу - доступ только из app

  # ------------------------------------------------------------
  # Nginx - Reverse Proxy + SSL
  # ------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: 1000fps-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:rw
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
      - parser
    networks:
      - 1000fps-network

# ------------------------------------------------------------
# Volumes - Постоянные хранилища
# ------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  parser_data:
    driver: local
  nginx_cache:
    driver: local
  app_uploads:
    driver: local

# ------------------------------------------------------------
# Networks - Сети
# ------------------------------------------------------------
networks:
  1000fps-network:
    driver: bridge
