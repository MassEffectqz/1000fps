# ============================================================
# Docker Compose для production 1000fps
# Сервисы: PostgreSQL + Redis + Next.js App + Parser
# Доступ к сайту: http://5.129.193.202:3000
# ============================================================

services:
  # ------------------------------------------------------------
  # PostgreSQL - База данных
  # ------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: 1000fps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fps1000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fps1000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - 1000fps-network

  # ------------------------------------------------------------
  # Redis - Кэширование
  # ------------------------------------------------------------
  redis:
    image: redis:7
    container_name: 1000fps-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - 1000fps-network

  # ------------------------------------------------------------
  # Next.js App - Основное приложение (prod)
  # ------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: 1000fps-app
    container_name: 1000fps-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/fps1000?schema=public"
      REDIS_URL: "redis://redis:6379"
      NEXT_PUBLIC_APP_URL: "http://5.129.193.202:3000"
      JWT_SECRET: "${JWT_SECRET}"
      COOKIE_SECRET: "${COOKIE_SECRET}"
      PARSER_URL: "http://parser:3005"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      UPLOAD_DIR: "/app/public/uploads"
    volumes:
      - uploads_data:/app/public/uploads
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "server.js"]
    networks:
      - 1000fps-network

  # ------------------------------------------------------------
  # Parser Server - Сервер парсинга
  # ------------------------------------------------------------
  parser:
    build:
      context: ./parser
      dockerfile: Dockerfile
    image: 1000fps-parser
    container_name: 1000fps-parser
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PARSER_PORT: "3005"
      SITE_WEBHOOK_URL: "http://app:3000/api/admin/parser/webhook"
    ports:
      - "3005:3000"
    depends_on:
      app:
        condition: service_started
    networks:
      - 1000fps-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  1000fps-network:
    driver: bridge