# ============================================
# Production Docker Compose для 1000FPS
# ============================================
# Версия: 1.0.0
# ============================================

services:
  # ============================================
  # PostgreSQL - Production
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: 1000fps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-site1000fps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      POSTGRES_DB: site1000fps
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - 1000fps-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-site1000fps}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis - Production
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: 1000fps-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - 1000fps-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Meilisearch - Production
  # ============================================
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: 1000fps-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change_meili_key}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    ports:
      - "${MEILI_PORT:-7700}:7700"
    networks:
      - 1000fps-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API - NestJS Backend
  # ============================================
  api:
    build:
      context: ../../..
      dockerfile: packages/api/Dockerfile.prod
    container_name: 1000fps-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-site1000fps}:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/site1000fps?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_redis_password}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_jwt_secret_min_32_chars}
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change_meili_key}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - 1000fps-network
    command: >
      sh -c "npx prisma migrate deploy && npm run start:prod"

  # ============================================
  # Storefront - Next.js Frontend
  # ============================================
  storefront:
    build:
      context: ../../..
      dockerfile: apps/storefront/Dockerfile.prod
    container_name: 1000fps-storefront
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "${STOREFRONT_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - 1000fps-network

  # ============================================
  # Admin - Next.js Admin Panel
  # ============================================
  admin:
    build:
      context: ../../..
      dockerfile: apps/admin/Dockerfile.prod
    container_name: 1000fps-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:3002}
    ports:
      - "${ADMIN_PORT:-3002}:3002"
    depends_on:
      - api
    networks:
      - 1000fps-network

  # ============================================
  # Nginx - Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: 1000fps-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - storefront
      - admin
    networks:
      - 1000fps-network

  # ============================================
  # pgAdmin - Database Management
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: 1000fps-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@1000fps.ru}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-change_pgadmin_password}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - 1000fps-network
    profiles:
      - tools

  # ============================================
  # Redis Commander - Redis Management
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: 1000fps-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-change_redis_password}
      HTTP_USER: ${REDIS_COMMANDER_USER:-admin}
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD:-change_commander_password}
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      - redis
    networks:
      - 1000fps-network
    profiles:
      - tools

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meili_data:
    driver: local
  pgadmin_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  1000fps-network:
    driver: bridge
