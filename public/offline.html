<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нет подключения | 1000FPS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon svg {
      width: 60px;
      height: 60px;
      color: #ff6600;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 15px;
      color: #fff;
    }
    
    p {
      font-size: 16px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    .actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }
    
    .btn-primary {
      background: #ff6600;
      color: #fff;
    }
    
    .btn-primary:hover {
      background: #ff7722;
    }
    
    .btn-secondary {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
    }
    
    .btn-secondary:hover {
      background: #222;
    }
    
    .btn svg {
      width: 18px;
      height: 18px;
    }
    
    @media (max-width: 480px) {
      h1 {
        font-size: 24px;
      }
      
      .icon {
        width: 100px;
        height: 100px;
      }
      
      .icon svg {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 20V10M12 20V4M6 20v-6" />
      </svg>
    </div>
    
    <h1>Нет подключения</h1>
    
    <p>
      Похоже, у вас нет подключения к интернету. Проверьте соединение и попробуйте снова.
      Вы также можете просмотреть ранее загруженные страницы.
    </p>
    
    <div class="actions">
      <button class="btn btn-primary" onclick="window.location.reload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10" />
          <polyline points="1 20 1 14 7 14" />
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
        </svg>
        Обновить
      </button>
      
      <a href="/catalog" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        Каталог
      </a>
    </div>
  </div>
  
  <script>
    // Проверяем подключение
    window.addEventListener('online', () => {
      window.location.reload();
    });
    
    // Авто-обновление при появлении подключения через 3 секунды
    let checkInterval;
    const checkConnection = () => {
      if (navigator.onLine) {
        window.location.reload();
      }
    };
    
    checkInterval = setInterval(checkConnection, 3000);
    
    // Очищаем интервал при загрузке страницы
    window.addEventListener('load', () => {
      setTimeout(() => clearInterval(checkInterval), 10000);
    });
  </script>
</body>
</html>
