<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Очистка Service Worker</title>
  <style>
    body { font-family: system-ui; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #1a1a1a; padding: 2rem; border-radius: 12px; text-align: center; max-width: 400px; }
    h1 { font-size: 1.2rem; margin-bottom: 1rem; }
    .status { color: #888; margin: 1rem 0; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    a { color: #ff6600; text-decoration: none; }
    button { background: #ff6600; color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
    button:hover { background: #ff8833; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Очистка Service Worker</h1>
    <div id="status" class="status">Очистка...</div>
    <div id="log" class="status" style="font-size: 0.85rem;"></div>
    <button onclick="window.location.href='/profile'">Перейти в профиль</button>
  </div>
  <script>
    const log = document.getElementById('log');
    const status = document.getElementById('status');

    (async () => {
      try {
        // 1. Unregister all Service Workers
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          if (regs.length === 0) {
            log.textContent = 'Нет зарегистрированных SW';
          } else {
            for (const reg of regs) {
              await reg.unregister();
            }
            log.textContent = `Удалено SW: ${regs.length}`;
          }
        }

        // 2. Clear all caches
        if ('caches' in window) {
          const keys = await caches.keys();
          if (keys.length === 0) {
            log.textContent += (log.textContent ? '\n' : '') + 'Кэш пуст';
          } else {
            for (const key of keys) {
              await caches.delete(key);
            }
            log.textContent += (log.textContent ? '\n' : '') + `Удалено кэшей: ${keys.length}`;
          }
        }

        status.className = 'status ok';
        status.textContent = '✓ Очистка завершена!';

        // Auto-redirect to profile after 1s
        setTimeout(() => {
          window.location.href = '/profile';
        }, 1000);

      } catch (err) {
        status.className = 'status err';
        status.textContent = 'Ошибка: ' + err.message;
      }
    })();
  </script>
</body>
</html>
