[loggers]
keys=root,webhook,parser,error

[handlers]
keys=consoleHandler,fileHandler,errorFileHandler

[formatters]
keys=standard

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[logger_webhook]
level=INFO
handlers=consoleHandler,fileHandler
qualname=webhook
propagate=0

[logger_parser]
level=INFO
handlers=consoleHandler,fileHandler
qualname=parser
propagate=0

[logger_error]
level=ERROR
handlers=consoleHandler,errorFileHandler
qualname=error
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=standard
args=('logs/parser.log', 'a', 10485760, 5)
# Max 10MB per file, keep 5 files

[handler_errorFileHandler]
class=handlers.RotatingFileHandler
level=ERROR
formatter=standard
args=('logs/error.log', 'a', 10485760, 5)

[formatter_standard]
format=%(asctime)s | %(levelname)-8s | %(name)s | %(message)s
datefmt=%H:%M:%S
