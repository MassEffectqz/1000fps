<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1000fps WB Парсер</title>
<link rel="stylesheet" href="tracker.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <div class="logo-wrap">
        <span class="logo-title">1000fps</span>
        <span class="logo-subtitle">WB Price Tracker</span>
      </div>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-val" id="stat-count">0</span>
      <span class="stat-label">товаров</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item stat-green">
      <span class="stat-val" id="stat-up">0</span>
      <span class="stat-label">выросли</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item stat-red">
      <span class="stat-val" id="stat-down">0</span>
      <span class="stat-label">упали</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="last-check-wrap">
      <span class="check-dot"></span>
      <span class="last-check" id="last-check">Проверка...</span>
    </div>
    <button class="btn-action" id="btn-theme" title="Сменить тему">
      <svg class="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <svg class="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
    </button>
    <button class="btn-action" id="btn-export" title="Экспорт JSON">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
      </svg>
    </button>
    <button class="btn-primary" id="btn-refresh-all">
      <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
      </svg>
      <span>Обновить</span>
    </button>
  </div>
</header>

<div class="add-bar">
  <div class="add-card">
    <div class="add-header">
      <svg class="add-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 8v8M8 12h8"/>
      </svg>
      <span class="add-title">Добавить товар</span>
    </div>
    <div class="add-form">
      <div class="input-group">
        <input type="text" id="input-article" placeholder="Введите артикул или ссылку..." autocomplete="off" spellcheck="false">
        <button class="btn-add" id="btn-add">
          <span>Добавить</span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div class="add-hint" id="add-hint"></div>
    </div>
  </div>
  
  <!-- Search -->
  <div class="search-card" style="margin-top: 12px;">
    <div class="search-header">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <span class="search-title">Поиск</span>
    </div>
    <input type="text" id="search-input" placeholder="Поиск по названию, артикулу, бренду..." autocomplete="off" spellcheck="false" class="search-input">
  </div>
</div>

<div class="sort-bar">
  <span class="sort-label">Сортировка:</span>
  <div class="sort-group">
    <button class="sort-btn active" data-sort="added">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>
      По дате
    </button>
    <button class="sort-btn" data-sort="price-asc">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
      Цена ↑
    </button>
    <button class="sort-btn" data-sort="price-desc">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M19 12l-7 7-7-7"/>
      </svg>
      Цена ↓
    </button>
    <button class="sort-btn" data-sort="change">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 3v18h18M18 9l-5 5-4-4-3 3"/>
      </svg>
      Изменение
    </button>
    <button class="sort-btn" data-sort="name">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 7V4h16v3M9 20h6M12 4v16"/>
      </svg>
      Название
    </button>
  </div>
</div>

<main id="products-grid" class="products-grid">
  <div class="empty-state" id="empty-state">
    <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M20 7h-3a2 2 0 01-2-2V2"/>
      <path d="M9 18v-1a2 2 0 00-2-2H4a2 2 0 00-2 2v1a2 2 0 002 2h3a2 2 0 002-2zM15 2H6a2 2 0 00-2 2v11a2 2 0 002 2h4"/>
      <rect x="9" y="2" width="11" height="15" rx="2"/>
    </svg>
    <div class="empty-title">Нет товаров</div>
    <div class="empty-sub">Добавьте первый товар чтобы начать отслеживание цен</div>
  </div>
</main>

<!-- Detail modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <button class="modal-close" id="modal-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="tracker-utils.js"></script>
<script src="tracker.js"></script>
</body>
</html>
