<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1000FPS WB Parser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup-body">
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <span class="logo-text">1000FPS</span>
        <span class="logo-subtitle">WB Parser</span>
      </div>
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text">Загрузка...</span>
      </div>
    </header>

    <!-- Main Controls -->
    <main class="popup-main">
      <!-- Auto Parse Toggle -->
      <section class="control-section">
        <div class="control-row">
          <div class="control-label">
            <span class="control-icon">&#9881;</span>
            <span>Автопарсинг</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="autoParseToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <p class="control-hint">Автоматический парсинг при открытии страниц товаров WB</p>
      </section>

      <!-- Auto Close Toggle -->
      <section class="control-section">
        <div class="control-row">
          <div class="control-label">
            <span class="control-icon">&#10005;</span>
            <span>Автозакрытие вкладок</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="autoCloseToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <p class="control-hint">Закрывать вкладку после успешного парсинга</p>
      </section>

      <!-- Stats -->
      <section class="stats-section">
        <h3 class="stats-title">Статистика</h3>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-value" id="parsedCount">0</span>
            <span class="stat-label">Товаров</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="successCount">0</span>
            <span class="stat-label">Успешно</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="errorCount">0</span>
            <span class="stat-label">Ошибок</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="changedCount">0</span>
            <span class="stat-label">Изменений</span>
          </div>
        </div>
        <div class="last-check">
          <span>Последняя проверка:</span>
          <span id="lastCheckTime">-</span>
        </div>
      </section>

      <!-- Quick Actions -->
      <section class="actions-section">
        <button class="action-btn primary" id="refreshAllBtn">
          <span class="btn-icon">&#8635;</span>
          Обновить все цены
        </button>
        <button class="action-btn secondary" id="openTrackerBtn">
          <span class="btn-icon">&#128202;</span>
          Открыть трекер цен
        </button>
      </section>
    </main>

    <!-- Footer -->
    <footer class="popup-footer">
      <a href="#" id="settingsLink" class="footer-link">Настройки</a>
      <span class="footer-separator">|</span>
      <a href="#" id="exportBtn" class="footer-link">Экспорт JSON</a>
      <span class="footer-separator">|</span>
      <span class="footer-version">v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
