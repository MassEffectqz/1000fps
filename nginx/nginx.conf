# ============================================================
# Nginx конфигурация для 1000fps
# Reverse proxy + SSL + Gzip + Кэширование + Rate limiting
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ------------------------------------------------------------
    # Базовые настройки
    # ------------------------------------------------------------
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ------------------------------------------------------------
    # Gzip сжатие
    # ------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ------------------------------------------------------------
    # Rate limiting зоны
    # ------------------------------------------------------------
    # Ограничение по IP (10 запросов в секунду)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

    # Ограничение соединений
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ------------------------------------------------------------
    # Кэширование прокси
    # ------------------------------------------------------------
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=app_cache:10m 
                     max_size=100m inactive=60m use_temp_path=off;

    # ------------------------------------------------------------
    # Upstream для Next.js приложения
    # ------------------------------------------------------------
    upstream nextjs {
        server app:3000;
        keepalive 32;
    }

    # ------------------------------------------------------------
    # Upstream для Parser сервера
    # ------------------------------------------------------------
    upstream parser {
        server parser:3005;
        keepalive 8;
    }

    # ------------------------------------------------------------
    # HTTP сервер (редирект на HTTPS)
    # ------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Для Let's Encrypt validation
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Редирект всех остальных запросов на HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ------------------------------------------------------------
    # HTTPS сервер
    # ------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # ------------------------------------------------------------
        # SSL настройки
        # ------------------------------------------------------------
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # Современные настройки шифрования
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS (раскомментировать после настройки SSL)
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # ------------------------------------------------------------
        # Статика - кэширование на стороне клиента
        # ------------------------------------------------------------
        location /_next/static/ {
            alias /var/cache/nginx/next_static/;
            expires 365d;
            access_log off;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location /assets/ {
            proxy_pass http://nextjs;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # ------------------------------------------------------------
        # API endpoints - rate limiting
        # ------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }

        # ------------------------------------------------------------
        # Parser API - отдельный rate limit (внутренний API)
        # ------------------------------------------------------------
        location /parser-api/ {
            limit_req zone=api_limit burst=10 nodelay;
            limit_conn conn_limit 5;

            # Внутренний доступ только из app контейнера
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;

            rewrite ^/parser-api/(.*) /$1 break;
            proxy_pass http://parser;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 60s;
        }

        # ------------------------------------------------------------
        # Health check endpoint (без логирования)
        # ------------------------------------------------------------
        location /api/health {
            access_log off;
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ------------------------------------------------------------
        # Основное приложение
        # ------------------------------------------------------------
        location / {
            limit_req zone=general_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
            proxy_connect_timeout 60s;
            proxy_buffering off;

            # Для Next.js ISR/SSG
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }

        # ------------------------------------------------------------
        # Страницы ошибок
        # ------------------------------------------------------------
        error_page 429 /429.html;
        location = /429.html {
            internal;
            default_type text/html;
            return 429 '<!DOCTYPE html><html><head><title>Too Many Requests</title></head><body><h1>429 - Too Many Requests</h1><p>Please slow down.</p></body></html>';
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            default_type text/html;
            return 503 '<!DOCTYPE html><html><head><title>Service Unavailable</title></head><body><h1>503 - Service Unavailable</h1><p>Please try again later.</p></body></html>';
        }
    }
}
