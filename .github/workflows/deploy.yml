# ============================================================
# GitHub Actions Deploy Workflow
# Деплой при merge в main ветку
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# Отмена предыдущих деплоев
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_APP: ${{ github.repository }}/app
  IMAGE_NAME_PARSER: ${{ github.repository }}/parser

jobs:
  # ------------------------------------------------------------
  # Build и push Docker образов
  # ------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      app_tag: ${{ steps.meta_app.outputs.tags }}
      parser_tag: ${{ steps.meta_parser.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (App)
        id: meta_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_APP }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Extract metadata (Parser)
        id: meta_parser
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PARSER }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta_app.outputs.tags }}
          labels: ${{ steps.meta_app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Parser image
        uses: docker/build-push-action@v5
        with:
          context: ./parser
          file: ./parser/Dockerfile
          push: true
          tags: ${{ steps.meta_parser.outputs.tags }}
          labels: ${{ steps.meta_parser.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ------------------------------------------------------------
  # Деплой на Hetzner VPS
  # ------------------------------------------------------------
  deploy-hetzner:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_TARGET == 'hetzner' || vars.DEPLOY_TARGET == '' }}

    environment:
      name: production
      url: https://${{ secrets.VPS_HOST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            
            # Логирование в GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Переход в директорию проекта
            cd /opt/1000fps
            
            # Pull образов
            docker compose -f docker-compose.prod.yml pull
            
            # Применение миграций БД
            docker compose -f docker-compose.prod.yml run --rm app npx prisma migrate deploy
            
            # Перезапуск сервисов
            docker compose -f docker-compose.prod.yml up -d --force-recreate app parser
            
            # Очистка старых образов
            docker image prune -f
            
            # Проверка здоровья
            sleep 10
            docker compose -f docker-compose.prod.yml ps

  # ------------------------------------------------------------
  # Деплой на Railway
  # ------------------------------------------------------------
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.DEPLOY_TARGET == 'railway' }}

    environment:
      name: production
      url: https://${{ secrets.RAILWAY_PROJECT }}.railway.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          railway link --project ${{ secrets.RAILWAY_PROJECT }}
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ------------------------------------------------------------
  # Уведомление о деплое
  # ------------------------------------------------------------
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-hetzner, deploy-railway]
    if: always()

    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy-hetzner.result }}" == "success" ] || [ "${{ needs.deploy-railway.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
